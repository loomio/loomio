development:
  adapter: solid_cable
  polling_interval: 0.1.seconds
  message_retention: 1.day

test:
  adapter: solid_cable
  polling_interval: 0.1.seconds
  message_retention: 1.day

# Production uses Redis pub/sub when REDIS_CACHE_URL or REDIS_URL is set (shares
# the cache instance — cable is pub/sub so LRU eviction does not affect it),
# otherwise falls back to the DB-backed solid_cable adapter.
production:
<% redis_url = ENV['REDIS_CACHE_URL'].presence || ENV['REDIS_URL'].presence %>
<% if redis_url.nil? %>
  adapter: solid_cable
  polling_interval: 0.5.seconds
  message_retention: 1.day
<% else %>
  adapter: redis
  url: <%= redis_url %>
  channel_prefix: loomio_<%= Rails.env %>
<% end %>
