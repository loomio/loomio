<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link rel="icon" type="image/png" sizes="16x16" href="/brand/favicon-yellow-on-transparent-16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/brand/favicon-yellow-on-transparent-32.png">
    <link rel="icon" type="image/svg+xml" sizes="any" href="/brand/favicon-yellow-on-transparent.svg">
    <link rel="apple-touch-icon" href="/brand/icon-yellow-on-white-256.png">
    <title>Loomio</title>
    <style>
      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
      }

      #loading-placeholder {
        position: fixed;
        padding: 0;
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        height: 100%;
        background-color: #FFFFFF;
        color: #F5C401;
        justify-content: center;
      }

      #loading-logo {
        width: 60%;
        max-width: 320px;
        line-height: 0;
      }

      #loading-logo svg {
        display: block;
        width: 100%;
        height: auto;
      }

      @media (prefers-color-scheme: dark) {
        #loading-placeholder {
          background-color: #121212;
          color: #F5C401;
        }
      }
    </style>
  </head>

  <body>
    <div id="app">
      <div id="loading-placeholder">
        <div id="loading-logo"></div>
        <script>
          fetch('/brand/logo-current-color.svg')
            .then(response => response.ok ? response.text() : '')
            .then(svg => { document.getElementById('loading-logo').innerHTML = svg; })
            .catch(() => {});
        </script>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
