---
de:
  discussion_templates:
    blank:
      process_name: Leere Vorlage
      process_subtitle: Starte für jeden Zweck einen neuen Thread
      process_introduction: "<p>Starte in deiner Gruppe einen Thread zu einem beliebigen Thema.</p><p> Standardmäßig wird jeder in der Gruppe benachrichtigt, wenn du den Thread startest. Du kannst dies ändern, indem du das Feld „Einladung“ unten bearbeitest.</p>"
    discuss_a_topic:
      title_placeholder: Welches Thema möchtest du besprechen?
      process_name: Besprich ein Thema
      process_subtitle: Beginne eine Diskussion mit deiner Gruppe
      process_introduction: "<p>Gibt es ein Thema, ein Problem oder eine Chance, die du mit deiner Gruppe ansprechen möchtest?</p><p> Stelle das Thema vor, verlinke auf Hintergrundinformationen und bitte um Kommentare, Ideen und Hilfe.</p><p> Lade Menschen ein, sich zu beteiligen, indem du ihre Gedanken und relevanten Informationen einbringst. Verwende @mention, um die Aufmerksamkeit bestimmter Personen zu erregen.</p><p> Aktualisiere den Thread-Kontext im Verlauf der Diskussion, um ein Ergebnis zu erzielen.</p><p> Warte nicht, bis du alle Informationen hast, um einen Thread zu starten. Nutze den Thread lieber, um Leute einzuladen, die dir dabei helfen, das Thema zu erkunden und eine Lösung zu finden.</p>"
      description: <h3 id="introduce-and-describe-the-topic">Stelle das Thema vor und beschreibe es</h3><p></p><h3 id="why-is-this-important"> Warum ist das wichtig?</h3><p></p><h3 id="how-would-you-like-people-to-respond"> Wie möchtest du, dass die Leute reagieren?</h3><p></p>
    onboarding_to_loomio:
      title: Wir verwenden Loomio für unsere Gruppe
      process_name: Onboarding bei Loomio
      process_subtitle: Ein Thread, der Loomio-Neulingen dabei hilft, das Schreiben von Kommentaren und das Abstimmen zu üben.
      process_introduction: "<p>Verwende diese Vorlage, um Menschen Loomio vorzustellen.</p><p> Eine tolle Möglichkeit, Loomio zu erleben, besteht darin, eine Diskussion in Loomio zu eröffnen und eine Entscheidung zu treffen!</p><p> Beginne die Diskussion, indem du den Textaufforderungen unten folgst oder deine eigenen Worte einfügst.</p><p> Führe eine Sinnüberprüfung durch, damit deine Gruppe abstimmen und die Ergebnisse sehen kann.</p><p> Erschließe den Wert von Loomio, indem du Menschen in ihre erste Entscheidung einbeziehst.</p>"
      description: <h3 id="why-are-you-interested-in-using-loomio">Warum bist du an der Nutzung von Loomio interessiert?</h3><p> Wir sind daran interessiert, Loomio zu nutzen, um Menschen in Entscheidungen über unsere Organisation einzubeziehen.</p><h3 id="what-are-you-asking-people-to-do"> Was verlangst du von den Leuten?</h3><p> Ich würde gerne deine Meinung hören! Hinterlasse unten einen Kommentar und stimme für den Vorschlag ab.</p><p> Du kannst auf den Kommentar einer anderen Person antworten, indem du auf das Antwortsymbol unten rechts im Kommentar klickst.</p><p> Verwende @mention, um Personen zu benachrichtigen.</p>
      onboarding: Onboarding
    consent_process:
      title_placeholder: Entwicklung unserer Gesundheits- und Sicherheitsrichtlinie
      process_name: Einwilligungsprozess
      process_subtitle: Triff eine Entscheidung, die du ohne Bedenken ausprobieren kannst.
      process_introduction: '<p>Hole die Zustimmung zu einer Entscheidung ein, die du treffen musst, sofern keine wesentlichen Einwände gegen deinen Vorschlag bestehen, damit du schnell eine Entscheidung treffen kannst, die du jetzt „sicher ausprobieren“ kannst.</p><p> Typische Rollen:</p><ul><li><p> Antragsteller: Die Person, die ein Thema anspricht, das eine Entscheidung erfordert.</p></li><li><p> Moderator: Jemand, der dem Antragsteller helfen kann, seine Arbeit effizient zu erledigen.</p></li></ul><p> Gemeinsame Prozessschritte:</p><p> Schritt 1. Präsentiere einen Vorschlag mit einem Loomio-Thread.</p><p> Schritt 2. Ermögliche eine Runde von Fragen, Reaktionen und Kommentaren, um den Vorschlag mit einer Sinnüberprüfung zu verbessern.</p><p> Schritt 3. Ändere den Vorschlag mit Vorschlägen und Kommentaren.</p><p> Schritt 4: Frage mit einem Zustimmungsvorschlag, ob jemand einen sinnvollen Einwand gegen den geänderten Vorschlag hat.</p><p> Schritt 5: Integriere berechtigte Einwände, um eine geänderte Version des Vorschlags zu erstellen, von der alle zustimmen, dass sie „sicher ausprobiert“ werden kann, und gib nach Abschluss das Entscheidungsergebnis an.</p><p> <a target="_blank" rel="noopener noreferrer nofollow" href="https://help.loomio.com/en/guides/consent_process/index.html">Weiterlesen: Einwilligungsprozess.</a></p>'
      description: <h3 id="what-is-the-decision-you-need-to-make">Welche Entscheidung musst du treffen?</h3><h3 id=""></h3><h3 id="why-is-this-important-and-what-impact-does-it-have"> Warum ist das wichtig und welche Auswirkungen hat es?</h3><p></p><h3 id="what-information-do-people-need-for-context"> Welche Informationen benötigen Menschen für den Kontext?</h3><p></p><h3 id="who-is-the-facilitator-for-this-process"> Wer ist der Moderator dieses Prozesses?</h3><p></p>
      consent: Zustimmung
    advice_process:
      title_placeholder: Ich suche Rat zum Kauf eines neuen Computers
      process_name: Beratungsprozess
      process_subtitle: Lass dich bei einer Entscheidung, die du treffen musst, beraten.
      process_introduction: '<p>Triff eine Entscheidung mit dem Rat von Personen, die betroffen sind oder über Fachwissen verfügen, damit du eine bessere Entscheidung für dein Unternehmen treffen kannst.</p><p> Typische Rollen:</p><ul><li><p> Moderator: Die Person, die die Entscheidung trifft, oder jemanden bitten, die Entscheidung zu erleichtern.</p></li><li><p> Berater: Menschen, die betroffen sind oder über Fachwissen verfügen, die du einlädst.</p></li></ul><p> Gemeinsame Prozessschritte:</p><p> Schritt 1: Suche nach Input, um Perspektiven auszuloten, bevor du Maßnahmen vorschlägst.</p><p> Schritt 2. Mache einen Vorschlag und lass dich beraten – erstelle einen Beratungsvorschlag.</p><p> Schritt 3. Unter Berücksichtigung der erhaltenen Ratschläge triffst du eine Entscheidung und informierst die Personen, die Ratschläge gegeben haben – gib ein Ergebnis an.</p><p> <a target="_blank" rel="noopener noreferrer nofollow" href="https://help.loomio.com/en/guides/advice_process/index.html">Weiterlesen: Beratungsprozess.</a></p>'
      description: <h3 id="what-is-the-decision-you-need-to-make">Welche Entscheidung musst du treffen?</h3><p></p><h3 id="why-is-this-important-and-what-impact-does-it-have"> Warum ist das wichtig und welche Auswirkungen hat es?</h3><p></p><h3 id="what-advice-are-you-asking-to-help-you-make-a-good-decision"> Welchen Rat fragst du, um eine gute Entscheidung zu treffen?</h3><p></p><h3 id="who-is-the-facilitator-for-this-process"> Wer ist der Moderator dieses Prozesses?</h3><p></p>
      advice: Beratung
    pass_a_resolution:
      title_placeholder: Beschluss zur Genehmigung der Strategie
      process_name: Verabschiede einen Beschluss
      process_subtitle: Stelle eine Resolution mit Kontext und Hintergrundinformationen vor, beantworte Fragen und unterbreite einen Vorschlag zur Verabschiedung der Resolution.
      process_introduction: '<p>Roberts Regeln sind ein Rahmenwerk, das aus einer Reihe ethischer Kodizes und Regeln besteht und Gruppen dabei hilft, geordnete Treffen abzuhalten, die es der Mehrheit ermöglichen, zu regieren, während gleichzeitig die Stimmen der Minderheiten gehört werden. <a target="_blank" rel="noopener noreferrer nofollow" href="https://www.boardeffect.com/blog/roberts-rules-of-order-cheat-sheet/">https://www.boardeffect.com/blog/roberts-rules-of-order-cheat-sheet/</a> Ein Mitglied stellt einen Antrag, eine Aktion vorzuschlagen oder eine Entscheidung zu treffen, indem es sagt: „Ich gehe zu …". Ein anderes Mitglied muss den Antrag unterstützen, indem es sagt: „Ich stimme dem Antrag zu." Sobald jemand den Antrag unterstützt, stimmt die Gruppe über den Antrag ab. Die Beschlussfassung erfolgt mit Stimmenmehrheit oder einem Quorum, abhängig von den Bestimmungen der Satzung.</p>'
      description: "<p><strong>Gib den zu fassenden Beschluss an</strong></p><p></p><p> <strong>Skizziere Kontext- und Hintergrundinformationen</strong></p><p></p><p> <strong>Bitte die Mitglieder, Fragen zu stellen, Kommentare abzugeben und Informationen beizutragen, um ein gemeinsames Verständnis aufzubauen</strong></p><p></p>"
      resolution: Auflösung
    decision_by_consensus:
      title_placeholder: Überarbeitung der Satzung unserer Organisation
      process_name: Entscheidung im Konsens
      process_subtitle: Triff mit allen Beteiligten einen Tarifvertrag.
      process_introduction: '<p>Baue einen Konsens für eine Entscheidung auf, die du gemeinsam treffen musst, um eine Einigung zu erzielen, die den Bedürfnissen und Anliegen aller Beteiligten gerecht wird.</p><p> Typische Rollen:</p><ul><li><p> Benenne einen Moderator. (In Vorstandssitzungen ist dies in der Regel der Vorsitzende.)</p></li><li><p> Ein Quorum oder eine Mehrheit der Mitglieder zur Teilnahme, wie in den Statuten deiner Organisation festgelegt.</p></li></ul><p> Gemeinsame Prozessschritte:</p><p> Schritt 1: Schaffe einen offenen Raum für die Diskussion über ein Problem oder eine vorgeschlagene Entscheidung.</p><p> Schritt 2. Teste den Konsens und lege Einwände mit einem Sense-Check-Vorschlag offen.</p><p> Schritt 3. Kläre alle Punkte, fordere konstruktive Änderungen ein und ergänze den Vorschlag.</p><p> Schritt 4. Prüfe mit einem Konsensvorschlag, ob eine Einigung vorliegt und ob noch Einwände bestehen.</p><p> Schritt 5. Halte die Entscheidung mit Ergebnis und im offiziellen Protokoll der Organisation fest.</p><p> <a target="_blank" rel="noopener noreferrer nofollow" href="https://help.loomio.com/en/guides/consensus_process/index.html">Weiterlesen: Konsensprozess.</a></p>'
      description: <h3 id="what-is-the-decision-you-need-to-make">Welche Entscheidung musst du treffen?</h3><p></p><h3 id="why-is-this-important-and-what-impact-does-it-have"> Warum ist das wichtig und welche Auswirkungen hat es?</h3><p></p><h3 id="what-information-do-people-need-for-context"> Welche Informationen benötigen Menschen für den Kontext?</h3><p></p><h3 id="who-is-the-facilitator"> Wer ist der Moderator?</h3><p></p><h3 id="what-conditions-need-to-be-met-for-a-decision"> Welche Voraussetzungen müssen für eine Entscheidung erfüllt sein?</h3><h3 id=""></h3>
      consensus: Konsens
    share_links_and_info:
      title_placeholder: Teile Links und Informationen
      process_name: Teile Links und Informationen
      process_subtitle: Veröffentliche Informationen, Links und Berichte, um sie für Kommentare und Diskussionen zu teilen.
      process_introduction: "<p>Verwende einen Thread als „Pinnwand“ oder „Schwarzes Brett“ für deine Gruppe, um Informationen, Neuigkeiten und Ideen zu veröffentlichen, die du gerne miteinander teilen möchtest.</p><p> Lade Personen ein, die Formatierungstools „ <strong>Link einfügen</strong> “ und <strong>„Video einbetten“</strong> zu verwenden, um der Gruppe den Zugriff auf Informationen aus Loomio zu erleichtern. Verwende eine <strong>Überschrift</strong> für Kommentare, um den Kommentar an die Thread-Timeline anzuheften, damit er leicht gefunden werden kann.</p><p> <strong>Stecke</strong> den Thread so fest, dass er hängen bleibt, und rege <strong>Reaktionen</strong> an, um ihn aktiv zu halten und die Leute wissen zu lassen, dass du ihren Artikel gesehen hast.</p><p> Die Standardanzeige dieses Threads ist <strong>„Neueste“</strong> , sodass die neuesten Kommentare oben im Thread angezeigt werden.</p>"
      description: <p>Verwende diesen Thread, um Informationen, Hinweise und Dinge zu veröffentlichen, die du teilen möchtest – ein Ort, an dem du sehen kannst, was vor sich geht, und dich beteiligen kannst.</p><p data-text-align="start"> Teile Veranstaltungen, Berichte, Podcasts und andere interessante Online-Informationen.</p><p data-text-align="start"> Verwende die Formatierungstools <strong>„Link einfügen“</strong> und <strong>„Video einbetten“</strong> , um den Zugriff auf Informationen in Loomio zu erleichtern.</p>
      information: Information
    prepare_for_a_meeting:
      title_placeholder: Wir bereiten uns auf unser nächstes Treffen vor
      process_name: Bereite dich auf ein Meeting vor
      process_subtitle: Erstelle eine Tagesordnung, veröffentliche Vorstandsunterlagen und organisiere Verwaltungsangelegenheiten, damit alle auf dem neuesten Stand, im Kontext und vorbereitet sind.
      description: <p><strong>Schwerpunkt des Treffens</strong></p><p></p><p data-text-align="start"> <strong>Gliederung der Tagesordnung</strong></p><p data-text-align="start"></p><p data-text-align="start"> <strong>Aktionen vom letzten Treffen</strong></p><p data-text-align="start"></p><p data-text-align="start"> <strong>Wie sollten sich die Teilnehmer auf das Treffen vorbereiten?</strong></p><p data-text-align="start"></p><p data-text-align="start"> <strong>Liste der Unterlagen zur Sitzung</strong></p><p data-text-align="start"></p>
      process_introduction: <p>Plane ein effektives Meeting, indem du die Teilnehmer von Anfang an einbeziehst, dich auf die wichtigsten Themen konzentrierst und deine kostbare gemeinsame Zeit besser nutzt.</p><p> Verwende einen Thread als Container für dein Meeting, um einen Schwerpunkt für das Meeting festzulegen, die Tagesordnung festzulegen, einen geeigneten Termin zu finden, wichtige Dokumente und Berichte zu veröffentlichen, eine Diskussion über Tagesordnungspunkte zu starten und Maßnahmen und Protokolle nachzufassen.</p><p> Dies hilft allen, sich auf das Treffen vorzubereiten, indem sie die Materialien lesen und über Diskussionsthemen und zu treffende Entscheidungen nachdenken. Es ist dann wahrscheinlicher, dass die Mitglieder kontextbezogen ankommen und für das Meeting bereit sind.</p><p> Weitere Informationen zur <a target="_blank" rel="noopener noreferrer nofollow" href="https://help.loomio.com/en/guides/board_processes/meeting.html"><u>Vorbereitung auf ein Meeting</u></a> findest du im Good Governance Guide von Loomio.</p>
      meeting: Treffen
    build_a_policy:
      title_placeholder: Überarbeitung unserer Einstellungsrichtlinien
      process_name: Erstelle eine Richtlinie
      process_subtitle: Arbeite mit deinem Team zusammen, um ein Richtlinien- oder Verfahrensdokument zu erstellen und zu vereinbaren.
      process_introduction: "<p><span>Der Thread ist der Container für Diskussionen über die Richtlinie, in dem du Anforderungen und Grundsätze vereinbarst und Dokumententwürfe zur Kommentierung veröffentlichen kannst.</span></p><p> <span>Verwende die Vorlage, um Richtlinien mit einer kleinen Gruppe von Personen zu entwickeln, oder mache sie für die gesamte Organisation transparent und lade zu Kommentaren zu progressiven Versionen des Dokuments ein.</span></p><p> <span>Verwende einen Sense-Check-Vorschlag, um Gruppenmitglieder darüber zu informieren, dass ein Dokumententwurf zur Überprüfung bereit ist, und lade Personen ein, das Dokument zu lesen und mit Kommentaren oder Fragen zu antworten.</span></p><p> <span>Wenn ein „endgültiger“ Entwurf fertig ist, lege einen Zustimmungs- oder Konsensvorschlag vor, um das Dokument zu genehmigen.</span></p>"
      description: "<p><strong><span>Welche Richtlinie oder welches Dokument musst du erstellen?</span></strong></p><p></p><p> <strong><span>Warum ist das wichtig?</span></strong></p><p></p><p> <strong><span>Was verlangst du von den Leuten?</span></strong></p><p></p>"
      policy: Politik
    elect_a_governance_position:
      title_placeholder: Nominierung und Wahl des Rates
      process_name: Wähle eine Führungsposition
      process_subtitle: Nominiere und wähle jemanden für eine Leitungsfunktion im Rat, Ausschuss oder Vorstand.
      process_introduction: "<p>Stelle die Governance-Rolle und -Kriterien für die Position vor, um den Mitgliedern bei der Beurteilung von Kandidaten zu helfen.</p><p> Rufe mit einer Opt-in-Umfrage zur Nominierung auf. Bitte die Nominierten, ein Foto des Kandidaten zusammen mit seiner Biografie und Referenzen zu veröffentlichen. Bette eine Videobotschaft des Kandidaten ein, damit Mitglieder den Kandidaten direkt sehen und hören können.</p><p> Wenn du bereit bist, einen Kandidaten zu wählen, verwende einen Zustimmungsvorschlag.</p><p> Wenn du mehrere Kandidaten für eine Position hast, verwende den Vorschlag „Ranked Choice“, bei dem Wähler die Kandidaten in der Reihenfolge ihrer Präferenz einordnen können.</p>"
      description: '<h3 id="what-position-do-you-need-to-fill">Welche Position musst du besetzen?</h3><p></p><h3 id="why-is-this-important"> Warum ist das wichtig?</h3><p></p><h3 id="what-qualifications-skills-and-experiences-make-a-good-cand"> Welche Qualifikationen, Fähigkeiten und Erfahrungen zeichnen einen guten Kandidaten aus?</h3><p></p><h3 id="what-is-the-election-process"> Wie läuft der Wahlprozess ab?</h3><p> Stufe 1: Nominierungen – wir laden geeignete Kandidaten zur Nominierung ein.</p><p> Stufe 2: Stelle die Kandidaten vor – füge für jeden Kandidaten ein Foto, eine kurze Biografie und eine Referenz bei.</p><p> Stufe 3: Wahl – Abstimmung über die Ernennung eines Kandidaten für die Stelle.</p>'
      election: Wahl
    funding_decision:
      title_placeholder: Förderantrag für die Robotics Roadshow
      process_name: Förderentscheidung
      process_subtitle: Bearbeite einen Zuschuss-, Darlehens- oder Investitionsantrag und triff eine Finanzierungsentscheidung.
      process_introduction: "<p>Stelle einen Förderantrag und füge Unterlagen und andere unterstützende Materialien bei.</p><p> Fasse die Anwendung im Thread-Kontext zusammen.</p><p> Bitte autorisierte Personen, den Antrag zu prüfen und Fragen zu stellen. Plane ausreichend Zeit für die Diskussion ein.</p><p> Mache einen Konsensvorschlag zur Genehmigung der Finanzierung.</p><p> Wenn jemand anderer Meinung ist, frage nach einem Grund – zum Beispiel könnten weitere Informationen erforderlich sein. Bitte die Person, die nicht einverstanden ist, ihre Stimme zu ändern, wenn sie zufrieden ist.</p><p> Wenn du eine klare Entscheidung über den Förderantrag hast, gib ein Ergebnis an, um die Entscheidung festzuhalten.</p>"
      description: <h3 id="introduce-and-summarize-the-funding-application">Stelle den Förderantrag vor und fasse ihn zusammen</h3><p></p><h3 id="how-does-this-application-fit-with-funding-criteria"> Wie passt dieser Antrag zu den Förderkriterien?</h3><p></p><h3 id="who-is-authorized-to-approve-this-funding-decision"> Wer ist berechtigt, diesen Förderbescheid zu genehmigen?</h3><p></p><h3 id="invite-questions-from-decision-makers-to-process-the-applica"> Bitte Entscheidungsträger um Fragen zur Bearbeitung des Antrags</h3><p></p>
      funding: Finanzierung
    approve_a_document:
      title_placeholder: Entwicklung unserer Markenstrategie
      process_name: Genehmige ein Dokument
      process_subtitle: Ein wichtiges Dokument, eine Richtlinie oder eine Vereinbarung vorstellen, diskutieren und entwickeln.
      process_introduction: "<p>Stelle das Dokument zusammen mit etwaigen Hintergrundinformationen vor. Gib den Zweck des Dokuments an, damit du konzentriert bleibst.</p><p> Lade Personen ein, Informationen und ihr Fachwissen einzubringen, und nutze diese als Rahmen für das Dokument. Nimm Rückmeldungen und Beiträge von Menschen zur Kenntnis und berücksichtige diese.</p><p> Integriere Beiträge in einen ersten Entwurf des Dokuments und nachfolgende Entwürfe, bis es zur Genehmigung bereit ist.</p><p> Nutze eine Sense-Check-Umfrage, um Meinungen einzuholen und etwaige Probleme mit dem Entwurf zu klären.</p><p> Sobald das Feedback berücksichtigt und in das Dokument integriert wurde, fahre mit der Genehmigung oder Zustimmung zu einer Einwilligung oder einem Konsensvorschlag fort.</p><p> Der Thread wird zu einer klaren Aufzeichnung des Dokumenterstellungsfortschritts und der getroffenen Entscheidungen.</p>"
      description: <h3 id="what-is-the-purpose-of-the-document">Was ist der Zweck des Dokuments?</h3><p></p><h3 id="why-is-this-important"> Warum ist das wichtig?</h3><p></p><h3 id="what-are-you-asking-people-to-do"> Was verlangst du von den Leuten?</h3><p></p>
      document: Dokumentieren
    practice_thread:
      process_subtitle: Ein Thread, um Leute in der Gruppe willkommen zu heißen und die Verwendung von Loomio zu üben
      process_introduction: "<p>Nutze diese Vorlage, um neue Mitglieder willkommen zu heißen und sie frühzeitig zur Teilnahme zu ermutigen. Sie gibt den Teilnehmern die Möglichkeit, sich vorzustellen und die Funktionen von Loomio kennenzulernen.</p>"
      title: "\U0001F44B Willkommen! Sag Hallo und probier’s aus"
      description: "<p>Willkommen in unserer Loomio-Gruppe – schön, dich hier zu haben!</p><p> Dieser Thread bietet Platz für:</p><ul><li><p> Stell dich der Gruppe vor</p></li><li><p> Probiere einige der Funktionen von Loomio aus – zum Beispiel: Versuche es mit Reaktionen \U0001F44D</p></li><li><p> Stelle in dieser Phase alle Fragen, die du hast</p></li></ul><p> Wenn du nicht sicher bist, was du sagen sollst, reicht ein einfaches Hallo \U0001F642</p>"
      process_name: Übungsdiskussion
      process_subtitle_v2: Begrüßt die Leute und macht euch gemeinsam mit Loomio vertraut
      process_introduction_v2: "<p>Ein Willkommensthread für neue Gruppen. Hier stellen sich die Mitglieder vor, probieren Funktionen wie Kommentieren und Reagieren aus und stellen ihren ersten Vorschlag vor.</p>"
      title_v2: Herzlich willkommen! Stell dich vor und probier die Dinge aus!
      description_v2: "<p>Willkommen in der Gruppe! Dieser Thread dient dazu, Hallo zu sagen, Fragen zu stellen, Dinge auszuprobieren und sich mit Loomio vertraut zu machen.</p><p> Hinterlasse einen Kommentar, nutze eine Reaktion oder starte einen der unten stehenden Vorschläge.</p><p> Wenn du nicht sicher bist, was du sagen sollst, reicht ein einfaches Hallo! Oder probiere eines der unten stehenden Abstimmungstools aus.</p>"
