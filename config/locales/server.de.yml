  poll_templates:
    practice_proposal:
      title: Ich fange an, den Dreh rauszukriegen
      process_name: Praxisvorschlag
      process_subtitle: Erfahre, wie Vorschläge auf Loomio funktionieren, indem du einen ausprobierst.
      process_introduction: "<p>Nutze diese Vorlage, um deiner Gruppe den Umgang mit Vorschlägen auf Loomio zu erleichtern. So können alle Teilnehmer sicher und einfach das Abstimmen ausprobieren und sehen, wie alles zusammenpasst.</p>"
      details: "<p>Dies ist ein Probelauf, damit sich jeder mit der Funktionsweise von Vorschlägen auf Loomio vertraut machen kann.</p><p> Bitte stimme ab und hinterlasse, wenn du möchtest, eine Begründung.</p><p> Kein Druck, keine realen Konsequenzen. Es ist nur eine Möglichkeit, herauszufinden, wie Vorschläge funktionieren!</p>"
      outcome_statement: "<p>Danke für die Teilnahme an diesem Übungsvorschlag! \U0001F389</p><p> Dies war nur eine Gelegenheit, zu sehen, wie das Abstimmen und Kommentieren auf Loomio funktioniert. Es wird hier keine wirkliche Entscheidung getroffen – aber hoffentlich hat dies allen geholfen, sich mit dem Prozess vertraut zu machen.</p>"
      title_v2: Ananas gehört auf Pizza
      process_subtitle_v2: Probiere einen Vorschlag aus, damit du weißt, wie Abstimmungen funktionieren.
      process_introduction_v2: "<p>Eine spielerische Möglichkeit für eure Gruppe, das Abstimmen auf Loomio auszuprobieren. Wählt eine lockere Frage, lasst die Leute abstimmen und eine Begründung hinterlassen – keine wirkliche Entscheidung, nur Übung.</p>"
      details_v2: "<p>Dies ist ein Übungsvorschlag – hier wird keine wirkliche Entscheidung getroffen.</p><p> Probiere es aus, abzustimmen und einen Grund anzugeben, um zu sehen, wie Vorschläge auf Loomio funktionieren.</p>"
      outcome_statement_v2: "<p>Danke, dass du einen Vorschlag ausprobiert hast! Jetzt weißt du, wie das Abstimmen auf Loomio funktioniert.</p>"
      agree_meaning: Ich stimme dem zu.
      agree_prompt: Warum stimmst du zu?
      abstain_meaning: Ich habe dazu keine Meinung.
      abstain_prompt: Irgendwelche Gedanken dazu?
      disagree_meaning: Ich stimme dem nicht zu.
      disagree_prompt: Warum bist du anderer Meinung?
    proposal:
      process_subtitle: Einen Vorschlag zur Entscheidungsfindung machen
      process_introduction: <p>Der klassische Loomio-Vorschlag hilft dir bei der Entscheidungsfindung und führt aus einer Diskussion ein klares Ergebnis.</p><p> Schlage eine Vorgehensweise vor und fordere die Leute auf, mit „Zustimmen“, „Enthaltung“ oder „Ablehnen“ zu reagieren.</p><p> Bei der Abstimmung können die Wähler ihre Entscheidung begründen. Du kannst sehen, welche Position die anderen zu diesem Thema einnehmen und warum.</p><p> Auf diese Weise kannst du mithilfe eines Vorschlags die Leute zu einer Antwort auffordern, neue Informationen ans Licht bringen und ein gemeinsames Verständnis aufbauen – um deiner Gruppe zu helfen, eine bessere und fundiertere Entscheidung zu treffen.</p><p> Ein Vorschlag und die damit verbundene Diskussion stellen eine eigene Aufzeichnung darüber dar, wie die Entscheidung zustande kam.</p><p> <a target="_blank" href="https://help.loomio.com/en/user_manual/polls/decisions/index.html"><u>Lies mehr über die Verwendung des klassischen Loomio-Vorschlags im einfachen Entscheidungsprozess</u></a> .</p>
      title: Genehmige das neue Markenkonzept
      details: <h3 id="what-is-the-decision-you-need-to-make"><strong>Welche Entscheidung musst du treffen?</strong></h3><p></p><h3 id="why-is-this-important"> <strong>Warum ist das wichtig?</strong></h3><p></p><h3 id="what-are-you-asking-people-to-do"> <strong>Was verlangst du von den Leuten?</strong></h3><p></p><p> Damit dieser Vorschlag angenommen wird, muss die Mehrheit der Mitglieder zustimmen.</p><p> Wenn du nicht einverstanden bist, sag, warum und was sich ändern muss, damit du zustimmst.</p>
      agree: Zustimmen
      agree_meaning: Ich unterstütze den Vorschlag
      agree_prompt: Was gefällt dir an dem Vorschlag und welchen Nutzen hat die Gruppe davon?
      abstain: Verzichten
      disagree: Verschiedener Meinung sein
      disagree_meaning: An diesem Vorschlag muss etwas geändert werden, bevor ich ihn unterstützen kann.
      disagree_prompt: Wie könnte dieser Vorschlag verbessert werden, damit du ihn unterstützen kannst?
      abstain_meaning: Er/Sie entschied sich, nicht abzustimmen, oder war nicht in der Lage, an dieser Abstimmung teilzunehmen.
      abstain_prompt: Warum enthältst du dich der Stimme oder warum fühlst du dich nicht in der Lage, über diese Entscheidung abzustimmen?
    advice:
      process_subtitle: Lass dich bei einer Entscheidung beraten, die du treffen musst
      process_introduction: <p>Hol dir bei einer Entscheidung, die du treffen musst, Rat von Betroffenen oder Fachleuten ein, damit du eine bessere Entscheidung für dein Unternehmen treffen kannst.</p><ul><li><p> Beratung hilft dir, eine bessere Entscheidung für deine Organisation zu treffen.</p></li><li><p> Fördere Beziehungen, Lernmöglichkeiten und vielfältige Anregungen.</p></li><li><p> Fördere Eigeninitiative und Kreativität und sorge für mehr Freude an der Arbeit.</p></li></ul><p> <a target="_blank" href="https://help.loomio.com/en/guides/advice_process/index.html"><u>Lies mehr über den Beratungsprozess</u></a> .</p>
      title: Hilf Takashi, einen neuen Computer zu kaufen
      details: <h3 id="what-is-the-decision-you-need-to-make"><strong>Welche Entscheidung musst du treffen?</strong></h3><p></p><h3 id="why-is-this-important"> <strong>Warum ist das wichtig?</strong></h3><p></p><h3 id="what-advice-are-you-asking-from-people-to-help-you-make-a-go"> <strong>Welchen Rat erbittest du von anderen, um eine gute Entscheidung treffen zu können?</strong></h3><p></p><p> Ich bitte um deinen Input, der mir hilft, eine gute Entscheidung für unsere Organisation zu treffen.</p>
      agree: Zustimmen
      agree_meaning: Ich habe meinen Rat zu dieser Entscheidung angeboten
      agree_prompt: Fasse deinen Rat zusammen oder mache einen hilfreichen Kommentar
      abstain: Verzichten
      abstain_meaning: Ich habe keinen Rat anzubieten
